name: Atualizar concursos

on:
  workflow_dispatch:

  # Será ativado quando o scraper estiver completo.
  # O GitHub interpreta este cron em UTC.
  #
  # 10:17 UTC = 07:17 no horário de Brasília.
  #
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Atualizar concursos
        run: npm run atualizar

      - name: Validar resultado da extração
        run: node src/verificar-sanidade-dados.js

      - name: Executar testes
        run: npm test

      - name: Verificar alterações efetivas nos dados
        id: dados
        run: |
          mudou="$(node src/verificar-alteracoes-dados.js)"
          echo "mudou=$mudou" >> "$GITHUB_OUTPUT"

      - name: Salvar mudanças
        run: |
          if [ "${{ steps.dados.outputs.mudou }}" != "true" ]; then
            echo "Nenhuma alteração efetiva nos dados. Nenhum commit será criado."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/*.json

          if git diff --cached --quiet; then
            echo "Nenhum arquivo de dados foi alterado."
            exit 0
          fi

          git commit -m "chore(dados): atualiza concursos automaticamente"
          git push
